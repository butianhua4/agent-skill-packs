<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Safety and scope boundaries</title>
  <desc id="desc">A Fiverr gallery card explaining what is included and excluded for safe freelance delivery.</desc>
  <rect width="1600" height="1000" fill="#fff7ed"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="100" y="125" font-size="64" fill="#7c2d12" font-weight="900">Built For Safe Freelance Delivery</text>
    <text x="100" y="185" font-size="33" fill="#9a3412">Clear boundaries protect the buyer, seller, and platform.</text>
    <g transform="translate(100 285)">
      <rect width="660" height="455" rx="30" fill="#ffffff"/>
      <text x="42" y="72" font-size="38" fill="#166534" font-weight="900">Included</text>
      <text x="42" y="145" font-size="29" fill="#14532d">Redacted inputs</text>
      <text x="42" y="205" font-size="29" fill="#14532d">Public repositories</text>
      <text x="42" y="265" font-size="29" fill="#14532d">Scoped reports</text>
      <text x="42" y="325" font-size="29" fill="#14532d">Validation summaries</text>
      <text x="42" y="385" font-size="29" fill="#14532d">Buyer handoff notes</text>
    </g>
    <g transform="translate(840 285)">
      <rect width="660" height="455" rx="30" fill="#ffffff"/>
      <text x="42" y="72" font-size="38" fill="#991b1b" font-weight="900">Not Included</text>
      <text x="42" y="145" font-size="29" fill="#7f1d1d">Passwords, tokens, cookies</text>
      <text x="42" y="205" font-size="29" fill="#7f1d1d">Payment, payout, KYC, tax</text>
      <text x="42" y="265" font-size="29" fill="#7f1d1d">Wallet or OAuth work</text>
      <text x="42" y="325" font-size="29" fill="#7f1d1d">Unscoped private repo access</text>
      <text x="42" y="385" font-size="29" fill="#7f1d1d">Guaranteed revenue or ranking</text>
    </g>
    <rect x="100" y="825" width="1400" height="82" rx="24" fill="#431407"/>
    <text x="138" y="878" font-size="27" fill="#ffedd5" font-weight="800">Designed for redacted materials, safe scope, and platform-compliant handoff.</text>
  </g>
</svg>
