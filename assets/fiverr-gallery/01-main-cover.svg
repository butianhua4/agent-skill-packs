<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent and Skill Packs cover</title>
  <desc id="desc">A Fiverr gallery cover for a reusable AI agent and skill pack service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.58" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1340" cy="180" r="190" fill="#22c55e" opacity="0.12"/>
  <circle cx="210" cy="820" r="260" fill="#60a5fa" opacity="0.12"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="110" y="130" font-size="34" fill="#99f6e4" font-weight="800">AGENT SKILL PACK SYSTEM</text>
    <text x="110" y="245" font-size="82" fill="#ffffff" font-weight="900">AI Agent &amp; Skill Packs</text>
    <text x="110" y="315" font-size="38" fill="#dbeafe">For real business workflows, audits, handoffs, and reusable automation.</text>
    <g transform="translate(110 410)" filter="url(#shadow)">
      <rect width="1380" height="360" rx="34" fill="#ffffff" opacity="0.96"/>
      <text x="58" y="85" font-size="34" fill="#0f172a" font-weight="900">What you get</text>
      <g transform="translate(58 130)">
        <rect width="380" height="150" rx="24" fill="#dbeafe"/>
        <text x="30" y="54" font-size="27" fill="#1e3a8a" font-weight="900">12 validated packs</text>
        <text x="30" y="96" font-size="23" fill="#1d4ed8">Skill logic, tests, safety</text>
      </g>
      <g transform="translate(500 130)">
        <rect width="380" height="150" rx="24" fill="#ccfbf1"/>
        <text x="30" y="54" font-size="27" fill="#115e59" font-weight="900">Filled samples</text>
        <text x="30" y="96" font-size="23" fill="#0f766e">See delivery before order</text>
      </g>
      <g transform="translate(942 130)">
        <rect width="380" height="150" rx="24" fill="#ede9fe"/>
        <text x="30" y="54" font-size="27" fill="#5b21b6" font-weight="900">Client handoff</text>
        <text x="30" y="96" font-size="23" fill="#6d28d9">Reports, notes, checklist</text>
      </g>
    </g>
    <text x="110" y="890" font-size="30" fill="#e0f2fe" font-weight="800">Validated with npm run preflight</text>
    <text x="690" y="890" font-size="30" fill="#bbf7d0" font-weight="800">Built for Fiverr, GitHub, and OpenClaw-style workflows</text>
  </g>
</svg>
